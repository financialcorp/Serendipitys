<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serendipity Yacht Charter</title>

    <!-- 1. Browser Favicon (Small icon in the browser tab) -->
    <link rel="icon" type="image/png" href="/assets/thumbnail_logo.png" />
    <link rel="apple-touch-icon" href="/assets/thumbnail_logo.png" />

    <!-- 2. Search Engine Metadata -->
    <meta name="description" content="Experience luxury on a 94' Lazzara Yacht in St. Petersburg, Florida. Perfect for private events and premium excursions." />

    <!-- 3. Social Media Sharing Image (Open Graph) -->
    <!-- This section makes the image appear when you send the link in texts or social media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://serendipityyacht.netlify.app/thumbnail_logo.png" />
    <meta property="og:title" content="Serendipity Yacht Charter" />
    <meta property="og:description" content="Luxury 94' Lazzara Yacht Charter in St. Petersburg, Florida." />
    
    <!-- IMPORTANT: This must be the full direct link to your logo image -->
    <meta property="og:image" content="https://serendipityyacht.netlify.app/assets/thumbnail_logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- 4. Twitter/X Sharing Image -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Serendipity Yacht Charter" />
    <meta name="twitter:image" content="https://serendipityyacht.netlify.app/assets/thumbnail_logo.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
